apiVersion: v1
kind: Service
metadata:
  name: eventhub-backend
spec:
  type: ClusterIP
  selector:
    app: eventhub-backend
  ports:
    - port: 3000
      targetPort: 3000
---

apiVersion: v1
kind: Service
metadata:
  name: eventhub-backend-external
spec:
  type: NodePort
  selector:
    app: eventhub-backend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001 