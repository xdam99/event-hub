apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventhub-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventhub-nginx
  template:
    metadata:
      labels:
        app: eventhub-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 5173
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config-volume
          configMap:
            name: nginx-config