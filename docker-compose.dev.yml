services:
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app                # code source du front
      - /app/node_modules
    networks:
      - frontend

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - mongo
    environment:
      NODE_ENV: development
    volumes:
      - ./server:/app                # code source du back
      - server_data:/app/data      # dossier de données persistantes
      - server_uploads:/app/uploads # dossier uploads persistants
      - /app/node_modules
    networks:
      - backend
      - frontend

  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
    ports:
      - "27017:27017"
    networks:
      - backend

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: eventhub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpass
    ports:
      - "8080:80"
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  server_data:
  server_uploads:
  mysql_data:
  mongo_data:
